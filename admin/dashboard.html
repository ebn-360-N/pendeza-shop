<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PENDEZA</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <!-- Check if admin is logged in -->
    <script>
        if (localStorage.getItem('pendeza_admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    
    <div class="admin-container">
        <!-- Admin Sidebar -->
        <div class="admin-sidebar">
            <h2 class="gold-text">✦ PENDEZA</h2>
            <nav class="admin-nav">
                <a href="dashboard.html" class="active">🏠 Dashibodi</a>
                <a href="add-product.html">➕ Ongeza Bidhaa</a>
                <a href="orders.html">📋 Oda Zote</a>
                <a href="#" onclick="logout()" class="logout-btn">🚪 Toka</a>
            </nav>
        </div>
        
        <!-- Admin Content -->
        <div class="admin-content">
            <h1>Dashibodi ya Admin</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Jumla ya Bidhaa</h3>
                    <p class="stat-number" id="totalProducts">0</p>
                </div>
                <div class="stat-card">
                    <h3>Jumla ya Oda</h3>
                    <p class="stat-number" id="totalOrders">0</p>
                </div>
            </div>
            
            <div class="recent-orders">
                <h2>Oda za Hivi Karibuni</h2>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Jina la Mteja</th>
                                <th>Simu</th>
                                <th>Email</th>
                                <th>Bidhaa</th>
                                <th>Tarehe</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrders">
                            <tr>
                                <td colspan="6" style="text-align: center;">Hakuna oda bado</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function logout() {
            localStorage.removeItem('pendeza_admin_logged_in');
            window.location.href = 'login.html';
        }
        
        // Load stats
        function loadDashboard() {
            // Count products
            const products = JSON.parse(localStorage.getItem('pendeza_products') || '[]');
            document.getElementById('totalProducts').textContent = products.length;
            
            // Count orders
            const orders = JSON.parse(localStorage.getItem('pendeza_orders') || '[]');
            document.getElementById('totalOrders').textContent = orders.length;
            
            // Show recent orders (last 5)
            const recentOrders = orders.slice(-5).reverse();
            const tbody = document.getElementById('recentOrders');
            
            if (recentOrders.length > 0) {
                tbody.innerHTML = recentOrders.map((order, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${order.customer_name}</td>
                        <td>${order.phone}</td>
                        <td>${order.email}</td>
                        <td>${order.product_name}</td>
                        <td>${order.order_date}</td>
                    </tr>
                `).join('');
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
